<header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-40">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between gap-4">

    <a href="{{ site.baseurl }}/" class="flex items-center gap-3 no-underline">
      <img src="{{ site.baseurl }}/adomin.jpg" alt="Adomin" class="w-9 h-9 rounded-lg object-cover" />
      <div>
        <span class="font-black text-transparent bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-lg leading-none">
          {{ site.title }}
        </span>
        <p class="text-[10px] text-slate-400 font-medium hidden sm:block leading-none mt-0.5">{{ site.description }}</p>
      </div>
    </a>

    <nav aria-label="Main navigation" class="flex items-center gap-1 flex-wrap">
      {% for item in site.data.nav %}
      <a href="{{ site.baseurl }}{{ item.url }}"
         class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-300 hover:text-white hover:bg-slate-800 border border-transparent hover:border-slate-700 transition-colors">
        {{ item.label }}
      </a>
      {% endfor %}
      <a href="{{ site.github_url }}"
         class="px-3 py-1.5 rounded-lg text-xs font-bold uppercase tracking-widest bg-indigo-600 hover:bg-indigo-500 text-white transition-colors">
        GitHub
      </a>
    </nav>

  </div>
</header>
