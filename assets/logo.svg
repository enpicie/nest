<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48" role="img" aria-label="NEST – Netplay Event Starter Tools">
  <defs>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="36" height="36" rx="7"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="220" height="48" rx="0" fill="#0f172a"/>

  <!-- Icon placeholder (matches rounded-lg avatar style) -->
  <rect x="0" y="6" width="36" height="36" rx="7" fill="#1e293b"/>
  <!-- Simple "N" monogram inside icon as fallback representation -->
  <text x="18" y="29" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="900" fill="url(#titleGrad)" text-anchor="middle">N</text>

  <!-- NEST title -->
  <text
    x="46"
    y="27"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="20"
    font-weight="900"
    letter-spacing="-0.5"
    fill="url(#titleGrad)"
  >NEST</text>

  <!-- Description -->
  <text
    x="47"
    y="39"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="9.5"
    font-weight="500"
    letter-spacing="0.2"
    fill="#64748b"
  >Netplay Event Starter Tools</text>
</svg>
